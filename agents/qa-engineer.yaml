name: qa-engineer
display_name: QA Engineer
description: >
  As a senior QA Engineer, designs a comprehensive test strategy based on product requirements and system architecture;
  defines the test pyramid and coverage targets, recommends test tools and frameworks, writes critical test scenarios,
  defines acceptance criteria for feature areas, prepares a performance test plan,
  defines CI/CD quality gates, and creates a bug priority/severity classification framework.
  Output is a structured report ready for presentation to non-technical clients.
phase: 4
depends_on:
  - product-manager
  - architect
input_from:
  - product-manager
  - architect
system_prompt_file: prompts/qa-engineer.md
output_schema:
  test_strategy:
    type: object
  test_tools:
    type: array
    items: { type: object }
  critical_test_scenarios:
    type: array
    items: { type: object }
  acceptance_criteria:
    type: array
    items: { type: object }
  performance_test_plan:
    type: array
    items: { type: object }
  quality_gates:
    type: array
    items: { type: object }
  bug_management:
    type: object
  test_environment:
    type: object
  coverage_summary:
    type: object
  notes: { type: string }
