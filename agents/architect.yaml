name: architect
display_name: Software Architect
description: >
  As a senior Software Architect, designs the system architecture based on product requirements
  and technical strategy using C4 model terminology; writes sequence diagram descriptions for critical flows,
  creates an entity-relationship-based data model, prepares API endpoint specifications,
  defines error handling and caching strategy, plans monitoring/observability infrastructure,
  and proposes a migration/deployment strategy. Output is a structured report ready for presentation to non-technical clients.
phase: 3
depends_on:
  - product-manager
  - cto
input_from:
  - product-manager
  - cto
system_prompt_file: prompts/architect.md
output_schema:
  system_architecture:
    type: object
  critical_flows:
    type: array
    items: { type: object }
  data_model:
    type: object
  api_design:
    type: object
  error_handling:
    type: object
  caching:
    type: array
    items: { type: object }
  monitoring_observability:
    type: object
  migration_and_deployment:
    type: object
  directory_structure: { type: string }
  architectural_decisions:
    type: array
    items: { type: object }
