name: security-analyst
display_name: Security Analyst
description: >
  As a senior Security Analyst, builds on the CTO's technical decisions and the Architect's system design
  to perform an OWASP Top 10 assessment, review authentication and authorization architecture,
  define data protection and encryption strategy, prepare a GDPR/privacy compliance checklist,
  define API security measures, create a dependency scanning strategy,
  define security headers and CSP policy, draft an incident response plan,
  and perform threat modeling using the STRIDE methodology.
  Output is a structured report ready for presentation to non-technical clients.
phase: 4
depends_on:
  - cto
  - architect
input_from:
  - cto
  - architect
system_prompt_file: prompts/security-analyst.md
output_schema:
  owasp_assessment:
    type: array
    items: { type: object }
  authentication_authorization:
    type: object
  data_protection:
    type: object
  gdpr_compliance:
    type: object
  api_security:
    type: object
  dependency_scanning:
    type: object
  security_headers:
    type: object
  incident_response_plan:
    type: object
  threat_model_stride:
    type: array
    items: { type: object }
  priority_security_actions:
    type: array
    items: { type: object }
  notes: { type: string }
