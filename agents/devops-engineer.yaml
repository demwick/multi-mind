name: devops-engineer
display_name: DevOps Engineer
description: >
  As a senior DevOps Engineer, builds on the CTO's technical decisions and the Architect's system design
  to design CI/CD pipeline architecture, define Infrastructure as Code strategy, create a container orchestration plan,
  set up monitoring/alerting infrastructure, define the environment strategy, prepare a disaster recovery plan,
  optimize cloud costs, and define SLA/SLO targets.
  Output is a structured report ready for presentation to non-technical clients.
phase: 4
depends_on:
  - cto
  - architect
input_from:
  - cto
  - architect
system_prompt_file: prompts/devops-engineer.md
output_schema:
  cicd_pipeline:
    type: object
  iac_strategy:
    type: object
  container_orchestration:
    type: object
  monitoring_and_alerting:
    type: object
  environment_strategy:
    type: array
    items: { type: object }
  disaster_recovery:
    type: object
  cost_optimization:
    type: object
  devsecops:
    type: object
  general_risks:
    type: array
    items: { type: object }
  notes: { type: string }
