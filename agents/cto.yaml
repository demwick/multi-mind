name: cto
display_name: CTO / Tech Lead
description: >
  As an experienced CTO and Technical Lead, reviews product requirements and MVP scope;
  proposes a technology stack in ADR (Architecture Decision Record) format, performs scalability analysis
  (1x/10x/100x user scenarios), identifies security requirements, proposes a DevOps/CI-CD strategy,
  defines team composition and skill requirements, produces a cost breakdown, and assesses technical risks.
  Output is a structured report ready for presentation to non-technical clients.
phase: 2
depends_on:
  - product-manager
input_from:
  - product-manager
system_prompt_file: prompts/cto.md
output_schema:
  technology_decisions:
    type: array
    items: { type: object }
  build_buy_open_source:
    type: array
    items: { type: object }
  scalability:
    type: object
  security:
    type: object
  devops_cicd:
    type: object
  team_composition:
    type: array
    items: { type: object }
  cost_breakdown:
    type: object
  technical_risks:
    type: array
    items: { type: object }
  feasibility: { type: string }
  feasibility_notes: { type: string }
