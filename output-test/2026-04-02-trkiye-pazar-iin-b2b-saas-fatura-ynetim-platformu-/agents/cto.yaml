    kisi_sayisi: 1
    kritik_beceriler:
      - React + Next.js deneyimi
      - TypeScript
      - Responsive tasarım ve erişilebilirlik
      - Form-heavy uygulama deneyimi (fatura formları karmaşık)
    kaynak_tipi: iç
  - rol: Backend Developer
    kisi_sayisi: 1
    kritik_beceriler:
      - Node.js + NestJS
