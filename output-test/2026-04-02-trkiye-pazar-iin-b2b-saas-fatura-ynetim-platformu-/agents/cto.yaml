maliyet_dokumu:
  altyapi_aylik:
    dusuk_tahmin: $800
    yuksek_tahmin: $1.500
    detaylar:
      - "ECS Fargate (2 task, 2vCPU/4GB): $150-250/ay"
      - "RDS PostgreSQL (db.t3.medium, Multi-AZ): $150-200/ay"
      - "ElastiCache Redis (cache.t3.small): $50-80/ay"
      - "S3 (fatura arşivi, 100GB başlangıç): $5-10/ay"
      - "CloudFront CDN: $20-50/ay"
      - "ALB (Application Load Balancer): $30-50/ay"
      - "CloudWatch Logs + Metrics: $30-50/ay"
      - "NAT Gateway: $50-100/ay"
      - "Data transfer: $30-80/ay"
      - "Diğer (Route53, ACM, Secrets Manager): $20-30/ay"
      - "Staging ortamı (production'ın ~%40'ı): $250-500/ay"
  ucuncu_taraf_servisler:
    - servis: Özel Entegratör (Foriba/Uyumsoft)
      maliyet: $300-800/ay (fatura hacmine bağlı)
      amaci: GİB'e e-Fatura, e-Arşiv, e-İrsaliye iletimi
    - servis: Sentry
      maliyet: $0-26/ay (Team plan)
      amaci: Frontend ve backend hata izleme
    - servis: GitHub (Team)
      maliyet: $4/kullanıcı/ay (~$16/ay)
      amaci: Kaynak kod yönetimi, CI/CD (Actions)
    - servis: iyzico
      maliyet: İşlem başına %3.49 + sabit ücret
      amaci: Müşteri abonelik ödemeleri
    - servis: AWS SES
      maliyet: $10-30/ay
      amaci: Transactional e-posta (fatura bildirimleri, davetler)
    - servis: Netgsm SMS
      maliyet: $20-50/ay (hacme bağlı)
      amaci: SMS bildirimleri (Faz 3'te aktif)
    - servis: Vercel (Frontend hosting alternatifi)
      maliyet: $20/ay (Pro plan)
      amaci: Next.js frontend deployment — ECS'ye alternatif olarak
        değerlendirilebilir
  gelistirme_cabasi:
    kisi_hafta: 36-48 kişi-hafta (MVP, 10 hafta)
    maliyet_aralik_usd: 45.000-75.000
    varsayimlar:
      - 3 tam zamanlı geliştirici (lead + frontend + backend) — 10 hafta = 30
        kişi-hafta
      - 1 yarı zamanlı DevOps — 10 hafta x %50 = 5 kişi-hafta
      - 1 UI/UX tasarımcı — 4 hafta = 4 kişi-hafta
      - 1 QA — 3 hafta = 3 kişi-hafta
      - "Türkiye merkezli geliştirici maliyeti: aylık $2.500-4.000 (kıdemli)"
      - GİB sandbox ortamı entegrasyon testleri için ek 1-2 hafta buffer dahil
      - Özel entegratör anlaşma süreci paralelde yürütülür (geliştirme süresine
        eklenmez)
teknik_riskler:
  - risk: GİB API değişiklikleri ve kesintileri — UBL-TR şema versiyonu
      güncellemeleri, plansız bakım süreleri
    severity: yüksek
    azaltma: GİB entegrasyonunu soyut bir adaptör katmanı (port/adapter pattern)
      arkasına al. Entegratör değişikliği sadece adaptör implementasyonunu
      etkiler. GİB kesintilerinde faturalar BullMQ kuyruğunda bekletilir,
      otomatik retry ile gönderilir. GİB durum endpoint'ine health check cron
      job (5dk aralık) ile kesinti erken tespit edilir.
  - risk: Multi-tenant veri sızıntısı — Uygulama hatası nedeniyle bir tenant'ın
      başka tenant verilerine erişmesi
    severity: yüksek
    azaltma: PostgreSQL RLS politikaları ile veritabanı seviyesinde zorunlu tenant
      izolasyonu. Her request'te tenant_id session variable olarak set edilir ve
      RLS politikaları bunu filtreler. Uygulama katmanında NestJS interceptor
      ile ikinci savunma katmanı. Otomatik integration testleri ile cross-tenant
      erişim senaryoları sürekli test edilir.
  - risk: Özel entegratör bağımlılığı — Seçilen entegratörün fiyat artırması, hizmet
      kalitesi düşüşü veya kapanması
    severity: orta
    azaltma: Adaptör pattern sayesinde entegratör değişimi 1-2 haftalık efor ile
      yapılabilir. İkinci bir entegratör ile yedek anlaşma hazır tutulur.
      Paralelde kendi özel entegratör lisansı başvurusu yapılır (6-12 ay süreç).
  - risk: XML imzalama ve UBL-TR format uyumsuzlukları — GİB'in red yanıtları,
      format hataları
    severity: orta
    azaltma: GİB sandbox ortamında kapsamlı test senaryoları (farklı fatura tipleri,
      KDV oranları, istisna kodları). XML şema validasyonu fatura oluşturma
      aşamasında yapılır — GİB'e göndermeden önce hata yakalanır. GİB'in
      yayınladığı örnek XML'ler ile regression test suite oluşturulur.
  - risk: 10 haftalık MVP takviminin kayması — GİB entegrasyonu beklenenden karmaşık
      çıkabilir
    severity: orta
    azaltma: İlk 4 haftada GİB entegrasyonu önceliklendirilir — en riskli bileşen en
      erken başlar. Hafta 4 sonunda GİB sandbox'ta başarılı fatura gönderimi
      kilometre taşı. Bu taş tutturulamazsa kapsam daraltılır (e-İrsaliye Faz
      2'ye ertelenebilir).
  - risk: Performans sorunları toplu fatura işlemlerinde — 500+ faturanın aynı anda
      oluşturulması
    severity: düşük
    azaltma: Toplu fatura işlemleri BullMQ ile asenkron. Batch size limiti (100
      fatura/batch). Worker concurrency ayarlanabilir. MVP'de toplu fatura
      should-have olarak zaten Faz 2'de.
fizibilite: yüksek
fizibilite_notlari: >
  Proje teknik açıdan yüksek fizibiliteye sahiptir. Temel gerekçeler:


  1. **Kanıtlanmış teknoloji yığını:** React, Node.js, PostgreSQL üçlüsü dünya
  genelinde binlerce SaaS ürününde başarıyla kullanılmaktadır. Türkiye'deki
  geliştirici havuzu geniştir.


  2. **Kritik bağımlılık yönetilebilir:** GİB entegrasyonu en büyük teknik risk
  olmakla birlikte, mevcut özel entegratör API'leri üzerinden bu risk MVP için
  ortadan kalkar. Adaptör pattern ile uzun vadeli esneklik korunur.


  3. **Ölçeklenebilirlik yolu açık:** Monolitik başlangıç → yatay ölçekleme →
  microservice ayrıştırma yolu net. Erken optimizasyon yapılmadan, ihtiyaç
  duyuldukça ölçekleme mümkün.


  4. **Açık endişeler:**
     - GİB sandbox ortamı erişimi ve test süreci önceden başlatılmalıdır (bürokratik süreç 2-4 hafta sürebilir).
     - Özel entegratör anlaşması MVP başlamadan önce imzalanmalıdır — bu bir blocker olabilir.
     - KVKK uyumluluk danışmanlığı (veri işleme envanteri, aydınlatma metinleri) için hukuki destek gereklidir; bu teknik ekibin kapsamı dışındadır.
     - Fatura PDF şablonlarının GİB görsel standartlarına uygunluğu tasarım aşamasında doğrulanmalıdır.
