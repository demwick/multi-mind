teknoloji_kararlari:
  - karar_id: ADR-001
    kategori: frontend
    karar: React 18 + Next.js 14 (App Router) + TypeScript
    bagiam: KOBİ kullanıcılarına modern, hızlı ve responsive bir SPA deneyimi
      sunulması gerekiyor. SEO gereksinimleri sınırlı (B2B SaaS dashboard),
      ancak SSR ile login/landing sayfaları için performans avantajı sağlanmalı.
    alternatifler:
      - Vue.js 3 + Nuxt — Daha düşük öğrenme eğrisi ancak Türkiye'de React
        ekosistemi ve yetenek havuzu çok daha geniş
      - Angular — Kurumsal projelerde güçlü ancak KOBİ odaklı hızlı iterasyon
        için aşırı yapısal yük getirir
    gerekce: React, Türkiye'deki en geniş geliştirici havuzuna sahip. Next.js ile
      SSR/SSG esnekliği, API routes ile BFF katmanı ve Vercel üzerinde kolay
      deployment sağlanır. TypeScript ile fatura gibi karmaşık domain
      modellerinde tip güvenliği kritik.
    odunlesimler: Next.js App Router henüz bazı edge case'lerde olgunlaşmamış.
      Bundle size React ile Vue'ya kıyasla daha büyük olabilir ancak
      tree-shaking ve code splitting ile yönetilebilir.
  - karar_id: ADR-002
    kategori: backend
    karar: Node.js 20 LTS + NestJS + TypeScript
    bagiam: GİB web servisleriyle SOAP/XML entegrasyonu, multi-tenant RBAC, kuyruk
      bazlı asenkron işlemler ve REST API sunulması gerekiyor.
    alternatifler:
      - Express.js — Daha minimal ancak büyük projelerde yapı eksikliği teknik
        borç yaratır; DI, modülerlik ve test altyapısı manuel kurulmalı
      - Go (Gin/Fiber) — Performans avantajı var ancak XML/SOAP işleme
        ekosistemi zayıf; GİB UBL-TR entegrasyonu için olgun kütüphane yok
    gerekce: NestJS, modüler mimari, yerleşik DI container, guard/interceptor
      yapıları ile multi-tenant ve RBAC gereksinimlerine doğal uyum sağlar.
      TypeScript ile frontend arasında tip paylaşımı mümkün. Node.js XML işleme
      kütüphaneleri (fast-xml-parser, xmlbuilder2) GİB UBL-TR formatı için
      yeterli.
    odunlesimler: Node.js tek thread'li event loop ile CPU-yoğun XML imzalama
      işlemlerinde darboğaz yaratabilir — worker threads veya ayrı microservice
      ile çözülür. NestJS öğrenme eğrisi Express'e kıyasla daha dik.
  - karar_id: ADR-003
    kategori: veritabani
    karar: PostgreSQL 16 + Prisma ORM
    bagiam: Multi-tenant veri izolasyonu (RLS), karmaşık fatura ilişkileri, JSONB
      ile esnek metadata depolama ve KVKK uyumlu veri yönetimi gerekiyor.
    alternatifler:
      - MySQL 8 — Yaygın ancak RLS desteği yok; tenant izolasyonu uygulama
        katmanında yapılmalı ki bu güvenlik riski
      - MongoDB — Esnek şema avantajı var ancak fatura verileri ilişkisel
        yapıda; ACID transaction gereksinimleri güçlü; GİB raporlama sorguları
        SQL ile çok daha verimli
    gerekce: PostgreSQL'in Row-Level Security (RLS) özelliği multi-tenant izolasyonu
      veritabanı seviyesinde garanti eder — uygulama katmanında tenant filtresi
      unutulsa bile veri sızıntısı olmaz. Partitioning ile büyük tenant'ların
      fatura tablolarını yönetmek mümkün. Prisma ile type-safe sorgular ve
      migration yönetimi sağlanır.
    odunlesimler: Prisma, ham SQL performansının gerisinde kalabilir — karmaşık
      raporlama sorguları için raw SQL escape hatch kullanılması gerekebilir.
      PostgreSQL operasyonel karmaşıklığı MySQL'e kıyasla biraz daha yüksek.
  - karar_id: ADR-004
    kategori: altyapi
    karar: AWS (İstanbul Bölgesi — eu-south-2) + ECS Fargate + RDS PostgreSQL
    bagiam: KVKK gereği veriler Türkiye'de barındırılmalı. Yönetilen servislerle
      operasyonel yük minimize edilmeli. Ölçeklenebilir konteyner altyapısı
      gerekli.
    alternatifler:
      - Google Cloud (Doha bölgesi) — Türkiye'de bölgesi yok; en yakın Doha KVKK
        için yeterli değil
      - Hetzner/DigitalOcean Türkiye — Maliyet avantajı var ancak managed servis
        çeşitliliği çok sınırlı; SQS, SES, CloudWatch muadilleri yok
    gerekce: AWS İstanbul bölgesi (eu-south-2) KVKK uyumluluğunu doğrudan sağlar.
      ECS Fargate ile Kubernetes karmaşıklığı olmadan konteyner orkestrasyonu
      yapılır. RDS ile yönetilen PostgreSQL, otomatik yedekleme ve failover
      sunar. SQS, SES, CloudWatch gibi yönetilen servisler ile yap-satın al
      kararları kolaylaşır.
    odunlesimler: AWS maliyetleri Hetzner gibi alternatiflere kıyasla 3-5x daha
      yüksek. Vendor lock-in riski var ancak konteyner bazlı mimari ile
      taşınabilirlik korunur. İstanbul bölgesi diğer AWS bölgelerine kıyasla
      servis çeşitliliği biraz daha sınırlı olabilir.
  - karar_id: ADR-005
    kategori: servis
    karar: Redis (ElastiCache) — Oturum yönetimi, önbellek ve rate limiting
    bagiam: Multi-tenant ortamda oturum yönetimi, API rate limiting ve sık erişilen
      verilerin (müşteri listesi, ürün kataloğu) önbelleklenmesi gerekiyor.
    alternatifler:
      - Memcached — Daha basit ancak persistence yok; rate limiting için veri
        yapısı desteği yetersiz
      - Uygulama içi bellek önbellek — Birden fazla container instance'ında
        tutarsızlık yaratır
    gerekce: Redis sorted set'leri ile sliding window rate limiting, pub/sub ile
      gerçek zamanlı bildirimler ve string/hash yapıları ile oturum yönetimi tek
      araçla çözülür. ElastiCache ile yönetilen Redis operasyonel yükü azaltır.
    odunlesimler: Ek altyapı maliyeti (aylık ~$50-150). Redis tek bir failure point
      olabilir — ElastiCache Multi-AZ ile azaltılır.
  - karar_id: ADR-006
    kategori: servis
    karar: BullMQ — Asenkron iş kuyruğu (fatura gönderimi, toplu işlemler,
      bildirimler)
    bagiam: GİB'e fatura gönderimi senkron yapılmamalı — GİB kesintilerinde kuyrukta
      bekletme, retry ve dead letter queue gerekiyor. Toplu fatura oluşturma
      (REQ-011) asenkron olmalı.
    alternatifler:
      - AWS SQS — Yönetilen servis avantajı ancak Node.js ekosisteminde BullMQ
        kadar ergonomik değil; delayed jobs ve cron-like scheduling için ek
        yapılandırma gerekli
      - RabbitMQ — Güçlü ancak ayrı altyapı yönetimi ve operasyonel karmaşıklık
        getirir
    gerekce: BullMQ Redis üzerinde çalışır (zaten mevcut), Node.js native,
      TypeScript desteği mükemmel. Rate limiting, delayed jobs, repeatable jobs,
      priority queues ve dashboard (Bull Board) ile tam kontrol. PM'in
      belirttiği kuyruk bazlı asenkron mimari gereksinimini doğrudan karşılar.
    odunlesimler: Redis'e bağımlılık yaratır (zaten var). AWS SQS'e kıyasla
      operasyonel sorumluluk uygulama tarafında. Çok yüksek hacimde (100K+
      job/saat) Redis bellek yönetimi dikkat gerektirir.
yap_satin_al_acik_kaynak:
  - yetenek: e-Fatura / e-Arşiv / e-İrsaliye GİB Entegrasyonu
    karar: satın-al
    arac_veya_servis: Foriba veya Uyumsoft Özel Entegratör API'si (MVP için)
    gerekce: Kendi özel entegratör lisansı alma süreci 6-12 ay sürebilir. MVP'de
      mevcut lisanslı bir entegratör üzerinden GİB'e bağlanmak pazara giriş
      süresini 3-4 ay kısaltır. Adaptör katmanı ile entegratör değişimi veya
      kendi lisansa geçiş maliyetsiz yapılır.
  - yetenek: Kimlik Doğrulama ve Yetkilendirme
    karar: açık-kaynak
    arac_veya_servis: Passport.js + custom JWT + RBAC middleware (NestJS Guards)
    gerekce: Multi-tenant RBAC gereksinimleri projeye özgü (firma bazlı roller,
      davet sistemi). Auth0/Clerk gibi SaaS çözümler tenant bazlı role mapping
      için aşırı konfigürasyon gerektirir ve kullanıcı başına maliyet KOBİ
      fiyatlandırmasını olumsuz etkiler. Kendi auth katmanı tam kontrol sağlar.
  - yetenek: E-posta Gönderimi
    karar: satın-al
    arac_veya_servis: AWS SES
    gerekce: Fatura bildirimleri, davet e-postaları ve vade hatırlatmaları için
      güvenilir e-posta altyapısı gerekli. SES $0.10/1000 e-posta ile maliyet
      etkin. Kendi SMTP sunucusu kurmak deliverability sorunları ve operasyonel
      yük getirir.
  - yetenek: SMS Bildirimleri
    karar: satın-al
    arac_veya_servis: Netgsm veya İletimerkezi API
    gerekce: Türkiye'de SMS gönderimi için yerel sağlayıcılar gerekli (Twilio
      Türkiye'de pahalı ve numara temini zor). Netgsm uygun fiyatlı ve yaygın
      kullanılan bir çözüm.
  - yetenek: Ödeme ve Abonelik Yönetimi
    karar: satın-al
    arac_veya_servis: iyzico (Türkiye) + Stripe (uluslararası genişleme için)
    gerekce: iyzico Türkiye'de en yaygın ödeme altyapısı; TL ile recurring billing
      desteği var. Kendi ödeme sistemi kurmak PCI-DSS uyumluluk yükü getirir.
  - yetenek: PDF Oluşturma (Fatura çıktısı)
    karar: açık-kaynak
    arac_veya_servis: Puppeteer (headless Chrome) veya @react-pdf/renderer
    gerekce: Fatura PDF'leri GİB formatına uygun ve özelleştirilebilir olmalı. HTML
      şablon → PDF dönüşümü ile esnek tasarım sağlanır. Ticari PDF servisleri bu
      basit kullanım için gereksiz maliyet.
  - yetenek: XML İmzalama (e-Fatura dijital imza)
    karar: yap
    arac_veya_servis: xml-crypto + node-forge kütüphaneleri ile custom implementasyon
    gerekce: GİB UBL-TR XML imzalama standartları Türkiye'ye özgü; hazır bir SaaS
      çözüm yok. xml-crypto kütüphanesi XAdES-BES imzalama için kullanılabilir.
      Özel entegratör kullanıldığında imzalama entegratör tarafında yapılır;
      kendi lisans alındığında bu modül devreye girer.
  - yetenek: Monitoring ve Logging
    karar: satın-al
    arac_veya_servis: AWS CloudWatch + Sentry (hata takibi)
    gerekce: CloudWatch zaten AWS altyapısıyla entegre. Sentry frontend ve backend
      hata takibinde endüstri standardı; ücretsiz katmanı MVP için yeterli. ELK
      stack kurmak operasyonel yük getirir.
  - yetenek: Dosya Depolama (Fatura PDF, XML arşiv)
    karar: satın-al
    arac_veya_servis: AWS S3 (İstanbul bölgesi)
    gerekce: Fatura XML ve PDF dosyaları yasal olarak 10 yıl saklanmalı. S3 Glacier
      ile arşivleme maliyeti çok düşük. Kendi dosya sistemi yönetmek
      ölçeklenebilirlik ve dayanıklılık riski taşır.
olceklenebilirlik:
  senaryo_1x:
    kullanici_sayisi: 500 firma / ~1.500 kullanıcı
    aylik_fatura_hacmi: ~100.000 fatura/ay
    mimari_notlari: Tek bir ECS Fargate task (2 vCPU, 4GB RAM) + RDS db.t3.medium
      yeterli. Redis t3.small. Monolitik NestJS uygulaması, ayrı worker process
      ile kuyruk tüketimi. Tek AZ deployment kabul edilebilir, RDS Multi-AZ
      önerilir.
  senaryo_10x:
    kullanici_sayisi: 5.000 firma / ~15.000 kullanıcı
    aylik_fatura_hacmi: ~1.000.000 fatura/ay
    gerekli_degisiklikler:
      - ECS Fargate auto-scaling (2-8 task) ile yatay ölçekleme
      - RDS db.r6g.large'a yükseltme + read replica ekleme (raporlama sorguları
        için)
      - PostgreSQL partitioning — fatura tablosunu tenant_id + ay bazlı
        partition'lama
      - CDN (CloudFront) ile statik asset ve PDF dağıtımı
      - Redis cluster mode ile önbellek kapasitesini artırma
      - GİB entegratör API rate limit yönetimi — tenant bazlı fair queuing
      - Ayrı raporlama microservice'i — ağır analitik sorguları ana DB'den izole
        etme
  senaryo_100x:
    kullanici_sayisi: 50.000 firma / ~150.000 kullanıcı
    aylik_fatura_hacmi: ~10.000.000 fatura/ay
    gerekli_degisiklikler:
      - Kubernetes (EKS) geçişi — Fargate'in ötesinde ince taneli kaynak yönetimi
      - CQRS pattern — yazma ve okuma modellerinin ayrıştırılması
      - Event-driven mimari — EventBridge veya Kafka ile servisler arası iletişim
      - Veritabanı sharding — büyük tenant'lar için ayrı DB instance'ları
      - Kendi özel entegratör lisansı zorunlu — entegratör API maliyeti bu
        ölçekte sürdürülemez
      - Dedicated DevOps/SRE ekibi — 7/24 on-call rotasyonu
      - Multi-region deployment düşünülmeli (DR amaçlı, ikinci bölge pasif)
      - Elasticsearch ile tam metin arama ve gelişmiş fatura sorgulama
guvenlik:
  kimlik_dogrulama: JWT (access token 15dk + refresh token 7 gün) + bcrypt ile
    parola hash. MFA (TOTP) opsiyonel — admin kullanıcılar için zorunlu hale
    getirilebilir. Firma davet sistemi ile e-posta doğrulamalı kayıt.
  veri_sifreleme: TLS 1.3 ile aktarımda şifreleme (AWS ACM ile sertifika
    yönetimi). AES-256 ile durağan halde hassas veri şifreleme (vergi kimlik no,
    banka bilgileri). RDS encryption at rest varsayılan olarak aktif. S3
    server-side encryption (SSE-S3).
  api_guvenligi: Rate limiting — tenant bazlı (100 req/dk) ve endpoint bazlı
    (fatura oluşturma 30 req/dk). API key + JWT ile çift katmanlı kimlik
    doğrulama (harici API tüketicileri için). CORS whitelist. Request body size
    limiti (5MB). Helmet.js ile HTTP güvenlik header'ları.
  uyumluluk:
    - KVKK (6698 sayılı Kişisel Verilerin Korunması Kanunu) — Veri işleme
      envanteri, açık rıza yönetimi, veri silme/anonimleştirme mekanizması
    - GİB e-Belge Teknik Kılavuzları — UBL-TR 1.2 şema uyumluluğu
    - 5070 sayılı Elektronik İmza Kanunu — Nitelikli elektronik sertifika ile
      imzalama
    - VUK (Vergi Usul Kanunu) — Elektronik belge saklama yükümlülüğü (10 yıl)
  oncelikli_tehditler:
    - tehdit: Tenant veri sızıntısı (IDOR/Broken Access Control)
      onlem: PostgreSQL RLS ile veritabanı seviyesinde tenant izolasyonu. Her sorgu
        otomatik olarak tenant_id filtresinden geçer. NestJS Guard'ları ile
        request seviyesinde tenant doğrulama. Penetrasyon testlerinde IDOR
        senaryoları öncelikli.
    - tehdit: XML Injection / XXE saldırıları (GİB XML işleme)
      onlem: XML parser'da external entity resolution devre dışı. Gelen GİB
        yanıtlarında strict XML validation. libxmljs2 yerine fast-xml-parser
        (XXE'ye karşı varsayılan güvenli).
    - tehdit: Hesap ele geçirme (credential stuffing)
      onlem: Login rate limiting (5 başarısız deneme sonrası 15dk kilit). bcrypt cost
        factor 12. Breached password kontrolü (Have I Been Pwned API). Admin
        hesaplarında MFA zorunlu.
    - tehdit: SQL Injection
      onlem: Prisma ORM parametrik sorgular kullanır — raw SQL kullanıldığında
        $queryRawUnsafe yerine $queryRaw ile parametre binding zorunlu. ESLint
        kuralı ile unsafe sorgu kullanımı engellenir.
    - tehdit: Fatura verisinin manipülasyonu (integrity)
      onlem: Fatura oluşturulduktan sonra immutable — güncelleme yerine iptal + yeni
        fatura. Audit log ile tüm değişikliklerin kaydı. Dijital imza ile
        bütünlük doğrulaması.
devops_cicd:
  araclar:
    - GitHub Actions — CI/CD pipeline (build, test, deploy)
    - Docker — Uygulama konteynerizasyonu
    - AWS ECS Fargate — Konteyner orkestrasyonu (Kubernetes karmaşıklığı olmadan)
    - Terraform — Infrastructure as Code
    - Sentry — Hata izleme ve alerting
    - AWS CloudWatch — Log aggregation ve metrik izleme
    - Dependabot — Bağımlılık güvenlik güncellemeleri
  pipeline_adimlari:
    - Kod push → GitHub Actions tetiklenir
    - Lint (ESLint + Prettier) ve type check (tsc --noEmit)
    - Unit testler (Vitest) ve integration testler (Testcontainers + PostgreSQL)
    - Docker image build ve ECR'ye push
    - Staging ortamına otomatik deploy
    - Smoke testler (staging üzerinde API health check + kritik akış testi)
    - Manuel onay gate (production deploy için)
    - Production deploy (blue-green)
    - Post-deploy health check ve otomatik rollback (hata oranı eşik aşarsa)
  konteynerizasyon: Docker multi-stage build — builder stage (npm ci + build) ve
    runner stage (node:20-slim). Her servis için ayrı Dockerfile. docker-compose
    ile local geliştirme ortamı (PostgreSQL, Redis, MinIO).
  iac_yaklasimi: "Terraform ile AWS kaynakları yönetimi. Terraform state S3 +
    DynamoDB backend'de saklanır. Modüler yapı: networking, database, compute,
    monitoring ayrı modüller. Ortam bazlı tfvars dosyaları (dev, staging,
    prod)."
  surum_stratejisi: blue-green
  ortam_stratejisi:
    - development — Yerel Docker Compose ortamı, mock GİB API
    - staging — AWS'de production benzeri ortam, GİB test (sandbox) ortamına
      bağlı
    - production — AWS İstanbul bölgesi, gerçek GİB entegrasyonu
